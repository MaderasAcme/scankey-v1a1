# ScanKey - Stack local (P0.LD1) — SOLO desarrollo, nunca prod
# Levantar: docker compose up -d  (o -f docker-compose.local.yml)
# Apagar:   docker compose down
# Variables: SCN_LOCAL_DEV=1, SCN_MOCK_ENGINE=1, API_KEYS=local-dev-key (solo para local)

services:
  motor:
    build:
      context: .
      dockerfile: motor/Dockerfile
    ports:
      - "8081:8080"
    env_file:
      - path: .env.local
        required: false
    environment:
      PORT: 8080
      MODEL_PATH: /tmp/modelo_llaves.onnx
      SCN_MOCK_ENGINE: ${SCN_MOCK_ENGINE:-1}
    volumes:
      - motor_cache:/tmp
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - path: .env.local
        required: false
    environment:
      PORT: 8080
      MOTOR_URL: ${MOTOR_URL:-http://motor:8080}
      API_KEYS: ${API_KEYS:-local-dev-key}
      SCN_FEATURE_GATEWAY_IDTOKEN_PROXY_ENABLED: "false"
      SCN_LOCAL_DEV: ${SCN_LOCAL_DEV:-1}
    depends_on:
      motor:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ocr: (opcional; descomentar si existe servicio OCR)
  #   image: scankey-ocr
  #   ports:
  #     - "8082:8080"
  #   environment:
  #     OCR_URL: ""

volumes:
  motor_cache:
