# Despliega el gateway (scankey-gateway) a Cloud Run
# Requiere: GCP_PROJECT_ID, GCP_WIF_PROVIDER, GCP_WIF_SERVICE_ACCOUNT
# Env vars login (configurar manualmente en Cloud Run o Secret Manager):
#   WORKSHOP_LOGIN_EMAIL, WORKSHOP_LOGIN_PASSWORD, WORKSHOP_TOKEN
name: Deploy Gateway to Cloud Run

on:
  push:
    branches: [ main ]
    paths:
      - 'gateway/**'
      - 'common/**'
      - 'cloudbuild-gateway.yaml'
      - '.github/workflows/deploy-gateway.yml'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-southwest1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Gateway (Cloud Build)
        run: |
          gcloud builds submit --config=cloudbuild-gateway.yaml . \
            --project=${{ env.PROJECT_ID }} \
            --substitutions=SHORT_SHA=${{ github.sha }}

      - name: Smoke test (post-deploy)
        run: |
          set -eux
          GW_URL="$(gcloud run services describe scankey-gateway --region=${{ env.REGION }} --project=${{ env.PROJECT_ID }} --format='value(status.url)')"
          echo "Gateway URL: $GW_URL"

          echo "--- GET /health ---"
          HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$GW_URL/health")
          echo "Health status: $HEALTH_STATUS"
          if [ "$HEALTH_STATUS" != "200" ]; then
            echo "ERROR: GET /health returned $HEALTH_STATUS, expected 200"
            exit 1
          fi

          echo "--- POST /api/auth/login (route exists) ---"
          AUTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 -X POST -H "Content-Type: application/json" -d '{"email":"","password":""}' "$GW_URL/api/auth/login")
          echo "Auth status: $AUTH_STATUS"
          # 404 = ruta no existe (gateway desactualizado). 401/503/400 = ruta existe
          if [ "$AUTH_STATUS" = "404" ]; then
            echo "ERROR: POST /api/auth/login returned 404 — route not found. Gateway may be outdated."
            exit 1
          fi
          echo "OK: Auth route exists (status $AUTH_STATUS is acceptable: 401=invalid, 503=not configured, 400=invalid JSON)"
