name: Deploy Pages (gh-pages)

on:
  push:
    branches: [ main ]
    paths:
      - 'ui-studio/**'
      - '.github/workflows/deploy-pages.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui-studio/package-lock.json

      - name: Install (ui-studio)
        working-directory: ui-studio
        run: npm ci

      - name: Build (ui-studio)
        working-directory: ui-studio
        env:
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
        run: |
          npm run build:web || npm run build

      - name: Deploy gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ui-studio/dist
          force_orphan: true
          enable_jekyll: false
          cname: scankeyapp.com
