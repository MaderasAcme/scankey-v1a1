name: Deploy Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'ui-studio/**'
      - '.github/workflows/deploy-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui-studio/package-lock.json

      - name: Install (ui-studio)
        working-directory: ui-studio
        run: npm ci

      - name: Build (ui-studio)
        working-directory: ui-studio
        env:
          VITE_GATEWAY_BASE_URL: ${{ vars.VITE_GATEWAY_BASE_URL }}
          VITE_API_KEY: ${{ vars.VITE_API_KEY }}
        run: |
          echo "VITE_GATEWAY_BASE_URL=$VITE_GATEWAY_BASE_URL"
          test -n "$VITE_GATEWAY_BASE_URL" || { echo "ERROR: VITE_GATEWAY_BASE_URL must be set (Settings → Variables)" && exit 1; }
          npm run build:web || npm run build

      - name: Deploy ping (generado solo por workflow)
        working-directory: ui-studio
        env:
          VITE_GATEWAY_BASE_URL: ${{ vars.VITE_GATEWAY_BASE_URL }}
        run: |
          echo "DEPLOY_PING=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" > dist/deploy-ping.txt
          echo "COMMIT=${{ github.sha }}" >> dist/deploy-ping.txt
          echo "GATEWAY=$VITE_GATEWAY_BASE_URL" >> dist/deploy-ping.txt
          echo "UI_SOURCE=ui-studio" >> dist/deploy-ping.txt

      - name: Assert dist contents (anti-UI vieja)
        working-directory: ui-studio
        run: |
          echo "== dist/ listing =="
          ls -la dist | head -50
          echo "== required files =="
          test -f dist/index.html || (echo "ERROR: dist/index.html missing" && exit 1)
          test -f dist/ui-source.txt || (echo "ERROR: dist/ui-source.txt missing" && exit 1)
          grep -q "UI_SOURCE=ui-studio" dist/ui-source.txt || (echo "ERROR: ui-source.txt must contain UI_SOURCE=ui-studio" && exit 1)
          test -f dist/deploy-ping.txt || (echo "ERROR: dist/deploy-ping.txt missing" && exit 1)
          echo "deploy-ping.txt contents:"
          cat dist/deploy-ping.txt
          grep -q '^DEPLOY_PING=.' dist/deploy-ping.txt || (echo "ERROR: DEPLOY_PING empty in deploy-ping.txt" && exit 1)
          grep -q '^COMMIT=.' dist/deploy-ping.txt || (echo "ERROR: COMMIT empty in deploy-ping.txt" && exit 1)
          grep -q '^GATEWAY=.' dist/deploy-ping.txt || (echo "ERROR: GATEWAY empty in deploy-ping.txt" && exit 1)
          grep -q '^UI_SOURCE=ui-studio' dist/deploy-ping.txt || (echo "ERROR: UI_SOURCE missing in deploy-ping.txt" && exit 1)

      - name: Add CNAME for custom domain
        working-directory: ui-studio
        run: |
          echo "scankeyapp.com" > dist/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ui-studio/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Verify deploy-ping.txt (headers only)
        run: |
          echo "== maderasacme.github.io =="
          curl -sI "https://maderasacme.github.io/scankey-v1a1/deploy-ping.txt" || true
          echo ""
          echo "== scankeyapp.com =="
          curl -sI "https://scankeyapp.com/deploy-ping.txt" || true
          echo ""
          echo "== www.scankeyapp.com =="
          curl -sI "https://www.scankeyapp.com/deploy-ping.txt" || true
