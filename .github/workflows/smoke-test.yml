name: Motor Smoke Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [feat/ui-studio-official]

jobs:
  smoke-motor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui-studio/package-lock.json

      - name: Install UI deps
        run: npm ci
        working-directory: ui-studio

      - name: Build + guardrails
        run: npm run build
        working-directory: ui-studio

      - name: QA no-ts
        run: npm run qa:no-ts
        working-directory: ui-studio

      - name: QA contract
        run: npm run qa:contract
        working-directory: ui-studio

      - name: Levantar stack (gateway+motor)
        shell: bash
        run: |
          set -euxo pipefail
          docker compose -f docker-compose.local.yml up -d --build
          docker ps
          for i in {1..60}; do
            curl -fsS http://localhost:8080/health && break || true
            sleep 2
          done
          curl -fsS http://localhost:8080/health
          for i in {1..60}; do
            curl -fsS http://localhost:8081/health && break || true
            sleep 2
          done
          curl -fsS http://localhost:8081/health

      - name: Smoke REAL
        shell: bash
        run: |
          set -euxo pipefail
          RUN_SMOKE=1 npm -C ui-studio run qa:smoke
        env:
          SCN_SMOKE_URL: http://localhost:8080
          SCN_SMOKE_API_KEY: local-dev-key

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.local.yml down --remove-orphans
